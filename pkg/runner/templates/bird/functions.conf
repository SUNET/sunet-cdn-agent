# Generated by sunet-cdn-agent

include "{{.BirdVarsFile}}";

# Packets routed based on default route should use the BGP-announced
# loopback IP as source instead of selecting one of the linknet IP addresses
# involved in BGP peering.
#
# Without this it is possible that the source IP is selected from one of the
# linknet interfaces while actually using the other interface to transmit the
# packet. Doing so can lead to uRPF problems in the upstream router when it sees
# packets belonging to one linket being received on an interface connected to
# the other linknet.
function sunet_cdn_agent_set_prefsrc() {
    if net.type = NET_IP4 && net = 0.0.0.0/0 then krt_prefsrc = SUNET_CDN_AGENT_LOOPBACK_IP4;
    if net.type = NET_IP6 && net = ::/0 then krt_prefsrc = SUNET_CDN_AGENT_LOOPBACK_IP6;
}
