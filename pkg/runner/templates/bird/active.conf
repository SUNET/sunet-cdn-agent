# Generated by sunet-cdn-agent

function sunet_cdn_agent_export_v4() -> bool
{
	return net ~ [
		{{.LoopbackIP4}}/32{{if .IP4NetworkList}},{{end}}
{{- if .IP4NetworkList }}
		{{.IP4NetworkList}}
{{- end}}
	];
}

function sunet_cdn_agent_export_v6() -> bool
{
	return net ~ [
		{{.LoopbackIP6}}/128{{if .IP6NetworkList}},{{end}}
{{- if .IP6NetworkList }}
		{{.IP6NetworkList}}
{{- end}}
	];
}
