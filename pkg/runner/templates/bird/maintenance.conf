# Generated by sunet-cdn-agent

# We keep announcing loopback addresses in maintenance mode so any traffic
# arriving during the switch to maintenance mode can still be passed on with a
# source IP that is still being announced to upstream routers.

function sunet_cdn_agent_export_v4() -> bool
{
	return net ~ [
		{{.LoopbackIP4}}/32
	];
}

function sunet_cdn_agent_export_v6() -> bool
{
	return net ~ [
		{{.LoopbackIP6}}/128
	];
}
